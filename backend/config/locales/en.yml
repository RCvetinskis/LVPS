# Files in the config/locales directory are used for internationalization
# and are automatically loaded by Rails. If you want to use locales other
# than English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# The following keys must be escaped otherwise they will not be retrieved by
# the default I18n backend:
#
# true, false, on, off, yes, no
#
# Instead, surround them with single quotes.
#
# en:
#   "true": "foo"
#
# To learn more, please read the Rails Internationalization guide
# available at https://guides.rubyonrails.org/i18n.html.

en:
  time:
    formats:
      default: "%Y/%m/%d"
      short: "%H:%M"
      long: "%B %d, %Y at %H:%M"
  date:
    formats:
      default: "%Y/%m/%d"
      short: "%m/%d"
      long: "%B %d, %Y"
    month_names:
      [
        ~,
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ]
    day_names:
      [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ]
    abbr_day_names: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"]
  messages:
    success: "Successfully saved"
    error: "Failed to save"
    not_found: "Item not found"
    user_not_found: "Current user not found"
    company_not_found: "Company not found"
    schedules_not_found: "Workers schedules are not found"
    confirm: "Are you sure you want to continue?"
    cancel: "Cancel"
    save: "Save"
    delete: "Delete"
    edit: "Edit"
    view: "View"
    unauthorized: "Unauthorized"
  activerecord:
    attributes:
      roles:
        guest: "Guest"
        company_owner: "Company Owner"
        employee: "Employee"
      user:
        statuses:
          pending: "Pending"
          active: "Active"
          disabled: "Disabled"
        schedule:
          location: "Lokacija"
          location_id: "Lokacija"
    errors:
      format: "%{message}"
      models:
        user:
          attributes:
            email:
              blank: "can't be blank"
              invalid: "is invalid"
              taken: "has already been taken"
        schedule:
          attributes:
            location:
              required: "is required"
              blank: "can't be blank"
            location_id:
              blank: "Location is required"
              required: "Location is required"
              must_belong: "must belong to the company"
            user_id:
              already_scheduled: "%{full_name} already has a schedule on %{work_date} at %{company_name}"
        location:
          attributes:
            name:
              taken: "Location name has already been taken for this company"
              blank: "Location name cannot be blank"
            address:
              blank: "Location address cannot be blank"
            company_id:
              blank: "Company must be selected"
            primary_location:
              already_exists: "A default location already exists for this company"
      messages:
        record_invalid: "Validation failed: %{errors}"
        restrict_dependent_destroy:
          has_one: "Cannot delete record because a dependent %{record} exists"
          has_many: "Cannot delete record because dependent %{record} exist"
  export:
    work_schedule_title: "WORK SCHEDULE"
    schedule_sheet_name: "Schedule"
    daily_totals: "Daily totals"
    unknown: "Unknown"
    headers:
      id: "No."
      employee: "Employee"
      position: "Position"
      total_days: "Total Days"
      total_hours: "Total Hours"
  schedules:
    update_success: "Update schedule for %{user_name} at %{work_date}"
    create_success: "Schedule created for %{user_name} at %{work_date}"
    destroy_success: "Schedule deleted for %{user_name} at %{work_date}"
    errors:
      missing_work_pattern: "User work shift pattern not found. Please configure a work pattern for this user."
      invalid_date_range: "Invalid date range. Please provide valid from and to dates."
  schedule_types:
    work_day: "Work Day"
    overtime: "Overtime"
    vacation: "Vacation"
    sick_leave: "Sick Leave"
    unpaid_leave: "Unpaid Leave"
    holiday: "Holiday"
    short:
      work_day: ""
      overtime: "OT"
      vacation: "V"
      sick_leave: "SL"
      unpaid_leave: "UL"
      holiday: "H"
  user:
    sign_up_success: "Registration successful! Welcome aboard!"
    invitations:
      sent: "Invitation sent to %{email}"
  general:
    hours: "h."
